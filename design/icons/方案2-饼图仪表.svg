<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>

    <!-- 阴影效果 -->
    <filter id="dropShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient2)" filter="url(#dropShadow2)"/>

  <!-- 外圈装饰 -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <!-- 饼图分段 - 显示不同状态的颜色 -->
  <!-- Fresh (0-30%) - 绿色 -->
  <path d="M256,256 L256,76 A180,180 0 0,1 411.58,166 Z" fill="#10B981"/>

  <!-- Flow (30-60%) - 蓝色 -->
  <path d="M256,256 L411.58,166 A180,180 0 0,1 411.58,346 Z" fill="#3B82F6"/>

  <!-- Warning (60-80%) - 黄色 -->
  <path d="M256,256 L411.58,346 A180,180 0 0,1 313.26,409.77 Z" fill="#F59E0B"/>

  <!-- Panic (80-95%) - 橙色 -->
  <path d="M256,256 L313.26,409.77 A180,180 0 0,1 198.74,409.77 Z" fill="#F97316"/>

  <!-- Dead (95-100%) - 灰色 -->
  <path d="M256,256 L198.74,409.77 A180,180 0 0,1 256,76 Z" fill="#6B7280" opacity="0.3"/>

  <!-- 当前状态指示器 (在65%位置) -->
  <circle cx="362" cy="256" r="16" fill="#3B82F6" stroke="#ffffff" stroke-width="4">
    <animate attributeName="r" values="16;18;16" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- 中心圆 -->
  <circle cx="256" cy="256" r="80" fill="#ffffff" filter="url(#dropShadow2)"/>

  <!-- 中心百分比 -->
  <text x="256" y="275" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="56" font-weight="bold" fill="#1f2937" text-anchor="middle">65%</text>

  <!-- 状态标签 -->
  <text x="256" y="305" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="14" fill="#6b7280" text-anchor="middle" font-weight="500">FLOW</text>
</svg>
