<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变：从绿色到红色 -->
    <linearGradient id="progressGradient4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>

    <!-- 背景渐变 -->
    <linearGradient id="bgGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>

    <!-- P字母渐变 -->
    <linearGradient id="letterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>

    <!-- 阴影效果 -->
    <filter id="dropShadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 内阴影 -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="2" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#000000" flood-opacity="0.1" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="16" y="16" width="480" height="480" rx="100" fill="url(#bgGradient4)" filter="url(#dropShadow4)"/>

  <!-- 外圈进度环背景 -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#e2e8f0" stroke-width="16" stroke-linecap="round"/>

  <!-- 进度环 (65% 进度) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#progressGradient4)" stroke-width="16" stroke-linecap="round"
          stroke-dasharray="1256.64" stroke-dashoffset="439.82" transform="rotate(-90 256 256)"/>

  <!-- 内圈装饰 -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#e5e7eb" stroke-width="2"/>

  <!-- P字母 -->
  <g transform="translate(256, 256)">
    <!-- P的主竖线 -->
    <rect x="-60" y="-80" width="24" height="160" rx="4" fill="url(#letterGradient)" filter="url(#innerShadow)"/>

    <!-- P的上半圆 -->
    <path d="M-36,-80 A60,60 0 0,1 60,-20 A60,60 0 0,1 24,50 L-36,50 Z"
          fill="url(#letterGradient)" filter="url(#innerShadow)"/>

    <!-- P内部的镂空圆角矩形 -->
    <rect x="-12" y="-50" width="56" height="80" rx="8" fill="#ffffff"/>
  </g>

  <!-- 右上角百分比徽章 -->
  <g transform="translate(400, 112)">
    <circle cx="0" cy="0" r="40" fill="#3B82F6" filter="url(#dropShadow4)"/>
    <text x="0" y="8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">65</text>
  </g>

  <!-- 底部小刻度指示器 -->
  <g transform="translate(256, 420)">
    <rect x="-60" y="-4" width="120" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="-60" y="-4" width="78" height="8" rx="4" fill="url(#progressGradient4)"/>
    <circle cx="18" cy="0" r="8" fill="#3B82F6"/>
  </g>
</svg>
