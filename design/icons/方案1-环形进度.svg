<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变：从绿色到红色 -->
    <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>

    <!-- 背景圆形渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
    </linearGradient>

    <!-- 阴影效果 -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#dropShadow)"/>

  <!-- 外圈装饰线 -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <!-- 进度环背景 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#e5e7eb" stroke-width="24" stroke-linecap="round"/>

  <!-- 进度环 (65% 进度) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#progressGradient)" stroke-width="24" stroke-linecap="round"
          stroke-dasharray="1130.97" stroke-dashoffset="395.84" transform="rotate(-90 256 256)"/>

  <!-- 内圈装饰 -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <!-- 中心百分比 -->
  <text x="256" y="268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="72" font-weight="bold" fill="#1f2937" text-anchor="middle">65%</text>

  <!-- 小刻度 -->
  <g stroke="#cbd5e1" stroke-width="2">
    <line x1="256" y1="50" x2="256" y2="65" />
    <line x1="376" y1="136" x2="385" y2="145" />
    <line x1="462" y1="256" x2="447" y2="256" />
    <line x1="376" y1="376" x2="385" y2="367" />
    <line x1="256" y1="462" x2="256" y2="447" />
    <line x1="136" y1="376" x2="127" y2="367" />
    <line x1="50" y1="256" x2="65" y2="256" />
    <line x1="136" y1="136" x2="127" y2="145" />
  </g>
</svg>
